locale: "fr"

backend:
  name: github
  repo: gabrielcodeproject/coach-gabriel-lavigueur # TODO — confirmer le nom du dépôt GitHub
  branch: main
  base_url: https://coach-gabriel-oauth.onrender.com # TODO — déployer une nouvelle instance OAuth proxy (voir README)
  auth_endpoint: auth
  local_backend: true

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

site_url: https://gabrielcodeproject.github.io/coach-gabriel-lavigueur
display_url: https://gabrielcodeproject.github.io/coach-gabriel-lavigueur
logo_url: /images/default/logo.png

collections:
  # ---------- PAGES ----------
  - name: "pages"
    label: "Pages"
    label_singular: "Page"
    description: "Les pages principales du site (contenu modifiable)."
    files:
      - file: "content/pages/accueil.md"
        label: "Accueil"
        name: "accueil"
        fields:
          - { label: "Titre", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "Hero — Ligne d'accroche", name: "hero_eyebrow", widget: "string" }
          - { label: "Hero — Titre", name: "hero_title", widget: "string" }
          - { label: "Hero — Sous-titre", name: "hero_subtitle", widget: "text" }
          - { label: "Hero — Libellé du bouton CTA", name: "hero_cta_label", widget: "string" }
          - { label: "Hero — Image", name: "hero_image", widget: "image" }
          - { label: "Fitlog — Titre", name: "fitlog_highlight_title", widget: "string" }
          - { label: "Fitlog — Corps", name: "fitlog_highlight_body", widget: "text" }
          - label: "SEO"
            name: "seo"
            widget: "object"
            collapsed: true
            required: false
            fields:
              - { label: "Titre SEO (60 car. max)", name: "title", widget: "string", required: false }
              - { label: "Meta description (160 car. max)", name: "description", widget: "text", required: false }
              - { label: "Mots-clés (séparés par des virgules)", name: "keywords", widget: "string", required: false }
              - { label: "Image de partage", name: "image", widget: "image", required: false }
          - { label: "Corps (texte libre)", name: "body", widget: "markdown" }

      - file: "content/pages/a-propos.md"
        label: "À propos"
        name: "a-propos"
        fields:
          - { label: "Titre", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "Intro — Titre", name: "intro_title", widget: "string" }
          - { label: "Intro — Corps", name: "intro_body", widget: "text" }
          - label: "Certifications / crédentiels"
            name: "credentials"
            widget: "list"
            required: false
            field: { label: "Élément", name: "item", widget: "string" }
          - label: "SEO"
            name: "seo"
            widget: "object"
            collapsed: true
            required: false
            fields:
              - { label: "Titre SEO", name: "title", widget: "string", required: false }
              - { label: "Meta description", name: "description", widget: "text", required: false }
          - { label: "Corps (texte libre)", name: "body", widget: "markdown" }

      - file: "content/pages/ma-methode.md"
        label: "Ma méthode"
        name: "ma-methode"
        fields:
          - { label: "Titre", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "Intro", name: "intro", widget: "text" }
          - label: "Étapes de la méthode"
            name: "steps"
            widget: "list"
            fields:
              - { label: "Titre de l'étape", name: "title", widget: "string" }
              - { label: "Corps", name: "body", widget: "text" }
              - label: "Icône Lucide"
                name: "icon_name"
                widget: "select"
                options:
                  - { label: "Liste à cocher", value: "ClipboardList" }
                  - { label: "Discussion", value: "MessagesSquare" }
                  - { label: "Crayon et règle", value: "PencilRuler" }
                  - { label: "Téléphone", value: "Smartphone" }
                  - { label: "Cycle de suivi", value: "RefreshCcw" }
          - label: "SEO"
            name: "seo"
            widget: "object"
            collapsed: true
            required: false
            fields:
              - { label: "Titre SEO", name: "title", widget: "string", required: false }
              - { label: "Meta description", name: "description", widget: "text", required: false }

      - file: "content/pages/mes-services.md"
        label: "Mes services (intro)"
        name: "mes-services"
        fields:
          - { label: "Titre", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "Intro", name: "intro", widget: "text" }
          - { label: "Encart tarif — Titre", name: "pricing_notice_title", widget: "string" }
          - { label: "Encart tarif — Corps", name: "pricing_notice_body", widget: "text" }
          - label: "SEO"
            name: "seo"
            widget: "object"
            collapsed: true
            required: false
            fields:
              - { label: "Titre SEO", name: "title", widget: "string", required: false }
              - { label: "Meta description", name: "description", widget: "text", required: false }

      - file: "content/pages/faq.md"
        label: "FAQ"
        name: "faq"
        fields:
          - { label: "Titre", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "Intro", name: "intro", widget: "text" }
          - label: "Questions fréquentes"
            name: "items"
            widget: "list"
            summary: "{{fields.question}}"
            fields:
              - { label: "Question", name: "question", widget: "string" }
              - { label: "Réponse", name: "answer", widget: "text" }
          - label: "SEO"
            name: "seo"
            widget: "object"
            collapsed: true
            required: false
            fields:
              - { label: "Titre SEO", name: "title", widget: "string", required: false }
              - { label: "Meta description", name: "description", widget: "text", required: false }

      - file: "content/pages/contact.md"
        label: "Contact (intro)"
        name: "contact"
        fields:
          - { label: "Titre", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "Intro", name: "intro", widget: "text" }
          - { label: "Intro du formulaire", name: "form_intro", widget: "text" }
          - { label: "Note sur le délai de réponse", name: "response_time_note", widget: "text" }
          - label: "SEO"
            name: "seo"
            widget: "object"
            collapsed: true
            required: false
            fields:
              - { label: "Titre SEO", name: "title", widget: "string", required: false }
              - { label: "Meta description", name: "description", widget: "text", required: false }

      - file: "content/pages/mentions-legales.md"
        label: "Mentions légales"
        name: "mentions-legales"
        fields:
          - { label: "Titre", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "Dernière mise à jour", name: "updated_at", widget: "datetime", format: "YYYY-MM-DD", time_format: false }
          - label: "SEO"
            name: "seo"
            widget: "object"
            collapsed: true
            required: false
            fields:
              - { label: "Titre SEO", name: "title", widget: "string", required: false }
              - { label: "Meta description", name: "description", widget: "text", required: false }
          - { label: "Corps", name: "body", widget: "markdown" }

      - file: "content/pages/politique-confidentialite.md"
        label: "Politique de confidentialité"
        name: "politique-confidentialite"
        fields:
          - { label: "Titre", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "Dernière mise à jour", name: "updated_at", widget: "datetime", format: "YYYY-MM-DD", time_format: false }
          - label: "SEO"
            name: "seo"
            widget: "object"
            collapsed: true
            required: false
            fields:
              - { label: "Titre SEO", name: "title", widget: "string", required: false }
              - { label: "Meta description", name: "description", widget: "text", required: false }
          - { label: "Corps", name: "body", widget: "markdown" }

  # ---------- SERVICES ----------
  - name: "services"
    label: "Services"
    label_singular: "Service"
    description: "Les offres affichées sur la page « Mes services » (prix, inclusions, visibilité)."
    folder: "content/services"
    create: true
    slug: "{{slug}}"
    identifier_field: "name"
    fields:
      - label: "Identifiant"
        name: "id"
        widget: "select"
        options:
          - { label: "Consultation initiale", value: "consultation-initiale" }
          - { label: "Plan d'entraînement", value: "plan-entrainement" }
          - { label: "Plan nutritionnel", value: "plan-nutrition" }
          - { label: "Consultation de suivi", value: "suivi" }
      - { label: "Nom du service", name: "name", widget: "string" }
      - { label: "Description courte", name: "short_description", widget: "text" }
      - { label: "Prix (CAD)", name: "price_cad", widget: "number", min: 0, value_type: "int" }
      - label: "Paiement unique à vie"
        name: "is_one_time"
        widget: "boolean"
        default: false
        hint: "Coche pour le plan nutritionnel — indique que le prix est payé une seule fois pour la création."
      - label: "Ce qui est inclus"
        name: "includes"
        widget: "list"
        field: { label: "Élément", name: "item", widget: "string" }
      - { label: "Ordre d'affichage", name: "sort_order", widget: "number", min: 0, default: 0, value_type: "int" }
      - { label: "Mis en avant", name: "featured", widget: "boolean", default: false }
      - { label: "Description longue", name: "long_description", widget: "markdown", required: false }

  # ---------- TRANSFORMATIONS ----------
  - name: "transformations"
    label: "Transformations"
    label_singular: "Transformation"
    description: "Études de cas clients, avec photos avant-après et témoignage."
    folder: "content/transformations"
    create: true
    slug: "{{slug}}"
    identifier_field: "client_name"
    summary: "{{client_name}} — {{duration_months}} mois ({{goal_tag}})"
    fields:
      - label: "Nom du client"
        name: "client_name"
        widget: "string"
        hint: "Utilise des initiales ou un prénom et l'initiale du nom pour préserver l'anonymat (ex. Marie L.)."
      - { label: "Photo avant", name: "before_image", widget: "image" }
      - { label: "Photo après", name: "after_image", widget: "image" }
      - { label: "Durée (mois)", name: "duration_months", widget: "number", min: 1, max: 60, value_type: "int" }
      - label: "Objectif"
        name: "goal_tag"
        widget: "select"
        options:
          - { label: "Perte de poids", value: "perte-de-poids" }
          - { label: "Prise de masse", value: "prise-de-masse" }
          - { label: "Recomposition", value: "recomposition" }
          - { label: "Post-grossesse", value: "post-grossesse" }
          - { label: "Performance", value: "performance" }
      - { label: "Poids de départ (kg)", name: "starting_weight_kg", widget: "number", required: false, value_type: "float" }
      - { label: "Poids final (kg)", name: "ending_weight_kg", widget: "number", required: false, value_type: "float" }
      - { label: "Variation du % de masse grasse", name: "body_fat_delta_pct", widget: "number", required: false, value_type: "float" }
      - { label: "Variation du tour de taille (cm)", name: "waist_delta_cm", widget: "number", required: false, value_type: "float" }
      - { label: "Témoignage court", name: "short_testimonial", widget: "text" }
      - { label: "Histoire complète (optionnel)", name: "long_story", widget: "markdown", required: false }
      - { label: "Date de publication", name: "published_date", widget: "datetime", format: "YYYY-MM-DD", time_format: false }
      - { label: "En vedette sur l'accueil", name: "featured", widget: "boolean", default: false }
